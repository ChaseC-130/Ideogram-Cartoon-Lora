# AI Toolkit LoRA training template for Ideogram 4.
# Copy to config/train_lora.yaml and edit local paths before running.

job: extension
config:
  name: "ideogram4_cartoon_lora"
  process:
    - type: "sd_trainer"
      training_folder: "output"
      device: "cuda"
      trigger_word: "custom_subject"

      network:
        type: "lora"
        linear: 16
        linear_alpha: 16

      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 4

      datasets:
        - folder_path: "/absolute/path/to/this-repo/dataset"
          caption_ext: "json"
          resolution: [1024, 1024]
          batch_size: 1

      train:
        epochs: 15
        steps: 2000
        gradient_accumulation_steps: 1
        lr: 1e-4
        optimizer: "adamw_8bit"
        lr_scheduler: "constant"
        noise_scheduler: "flowmatch"

      model:
        name_or_path: "ideogram-ai/ideogram-4-fp8"
        arch: "ideogram4"
        quantize: true
        gradient_checkpointing: true

      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "[trigger] cartoon game asset, clean readable silhouette, no text"
          - "[trigger] colorful cel-shaded illustration with crisp edges"
